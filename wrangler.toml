name = "cloudflare-docker-proxy"
compatibility_date = "2023-12-01"

[dev]
ip = "0.0.0.0"
port = 8787
local_protocol = "http"

[env.vars]
CUSTOM_DOMAIN = "coolan.online"

[env.dev.vars]
MODE = "debug"
TARGET_UPSTREAM = "https://registry-1.docker.io"

[env.production]
name = "cloudflare-docker-proxy"
# routes = [
#   { pattern = "docker.coolan.online", custom_domain = true },
#   { pattern = "quay.coolan.online", custom_domain = true },
#   { pattern = "gcr.coolan.online", custom_domain = true },
#   { pattern = "k8s-gcr.coolan.online", custom_domain = true },
#   { pattern = "k8s.coolan.online", custom_domain = true },
#   { pattern = "ghcr.coolan.online", custom_domain = true },
#   { pattern = "cloudsmith.coolan.online", custom_domain = true },
# ]

[env.production.vars]
MODE = "production"
TARGET_UPSTREAM = ""

[env.staging]
name = "cloudflare-docker-proxy-staging"
# route = { pattern = "docker-staging.coolan.online", custom_domain = true }

[env.staging.vars]
MODE = "staging"
TARGET_UPSTREAM = ""

# wrangler.toml (wrangler v3.79.0^)
[observability.logs]
enabled = true
